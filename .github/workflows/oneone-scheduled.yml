name: OneOne Scheduled Monitor
run-name: OneOne Scheduled Monitor (${{ github.event_name }})

on:
  workflow_dispatch:
  schedule:
    - cron: "7 * * * *"

permissions:
  contents: write

concurrency:
  group: oneone-scheduled-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run monitor loop
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CHECK_INTERVAL_SECONDS: "300"
        run: |
          for round in 1 2 3 4 5 6; do
            echo "Monitor round ${round}/6"
            (cd bladex_webhook && python webhook_monitor.py --once)

            git add -f bladex_webhook/state.json
            git diff --cached --quiet || git commit -m "Update monitor state"
            git push

            if [ "$round" != "6" ]; then
              sleep 600
            fi
          done
