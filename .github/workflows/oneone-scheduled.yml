name: OneOne Scheduled Monitor
run-name: OneOne Scheduled Monitor (${{ github.event_name }})

on:
  workflow_dispatch:
  schedule:
    - cron: "7-59/10 * * * *"

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bladex_webhook

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run monitor once
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CHECK_INTERVAL_SECONDS: "300"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python webhook_monitor.py --once

      - name: Save monitor state
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f bladex_webhook/state.json
          git diff --cached --quiet || git commit -m "Update monitor state"
          git push
